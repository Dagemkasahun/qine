services:
  - type: web
    name: qine-backend
    runtime: node
    plan: free
    rootDir: qine-admin-dashboard
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qine-db
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: postgresql
    name: qine-db
    plan: free
    ipAllowList: []